<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quartermaster Steel Logistics Suite</title>
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg-main: #1e1e24;
            --bg-container: #2b2b36;
            --text-main: #f5f5f5;
            --accent: #d4af37;
            --accent-hover: #b5952f;
            --border-color: #3a3a48;
            --bg-input: #1e1e24;
            --bg-box: #3a3a48;
            --bg-step: #23232c;
            --bg-cost: #2a2a1e;
            --text-dim: #a9a9b3;
            --text-value: #e0e0e0;
            --success: #4CAF50;
            --warning: #ff9800;
            /* Heat Map Colors */
            --hm-none: #666666;
            --hm-low: #ffcc00;
            --hm-high: #ff4400;
        }

        .light-theme {
            --bg-main: #f0f2f5;
            --bg-container: #ffffff;
            --text-main: #333333;
            --accent: #b5952f;
            --accent-hover: #8f7524;
            --border-color: #cccccc;
            --bg-input: #f9f9f9;
            --bg-box: #e9ecef;
            --bg-step: #f8f9fa;
            --bg-cost: #fff8e1;
            --text-dim: #666666;
            --text-value: #111111;
            --success: #2e7d32;
            --warning: #e65100;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background-color: var(--bg-container);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            position: relative;
        }
        h1, h2, h3 { color: var(--accent); }
        h1 { text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-top: 30px;}
        
        .header-controls {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
        }
        .header-btn, .header-select {
            background-color: var(--accent);
            color: #1e1e24;
            border: none;
            padding: 8px 12px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .controls { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin: 20px 0; }
        .input-group { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        .input-group label { font-size: 1.1em; margin-bottom: 8px; font-weight: bold; }
        
        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--bg-input);
            border: 2px solid var(--accent);
            border-radius: 5px;
            overflow: hidden;
        }
        .input-wrapper input[type="number"] {
            font-size: 1.5em;
            padding: 8px;
            width: 100%;
            text-align: center;
            background-color: transparent;
            color: var(--text-main);
            border: none;
            outline: none;
        }

        .bonus-toggles {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            background-color: var(--bg-cost);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid var(--accent);
        }

        .inventory-grid, .intermediate-grid {
            display: grid;
            gap: 10px;
            background-color: var(--bg-step);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            align-items: center;
        }
        .inventory-grid { grid-template-columns: 1fr 1fr 1fr; }
        .intermediate-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }

        .inv-header {
            font-weight: bold;
            color: var(--text-dim);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .inv-cell input {
            width: 90px;
            font-size: 1.1em;
            padding: 6px;
            text-align: center;
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--accent);
            border-radius: 5px;
        }

        .summary-box {
            background-color: var(--bg-box);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: grid;
            gap: 10px;
        }
        .summary-col { text-align: center; display: flex; flex-direction: column; gap: 5px; }
        .req-val { font-size: 1.1em; color: var(--text-main); opacity: 0.8; }
        .bank-val { font-size: 0.9em; color: var(--text-dim); }
        .def-val { font-size: 1.4em; font-weight: bold; transition: color 0.3s; }
        
        /* Heat-map utility classes */
        .hm-gray { color: var(--hm-none); opacity: 0.5; }
        .hm-yellow { color: var(--hm-low); text-shadow: 0 0 5px rgba(255, 204, 0, 0.2); }
        .hm-red { color: var(--hm-high); text-shadow: 0 0 8px rgba(255, 68, 0, 0.3); }

        .cost-box {
            background-color: var(--bg-cost);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            border-left: 4px solid var(--accent);
        }

        .step-card {
            background-color: var(--bg-step);
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
            border-radius: 4px;
        }
        .highlight { color: var(--accent); font-weight: bold; }

        .action-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .btn-action {
            background-color: var(--accent);
            color: #1e1e24;
            border: none;
            padding: 12px 24px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-status {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85em;
            color: var(--text-dim);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <select class="header-select" id="langSelect" onchange="changeLanguage()">
            <option value="en">EN</option>
            <option value="fr">FR</option>
        </select>
        <button class="header-btn" onclick="toggleTheme()">☀️/🌙</button>
    </div>

    <h1 id="mainTitle">Steel Logistics Suite</h1>

    <div class="controls main-inputs">
        <div class="input-group">
            <label id="inputLabel">Target Steel:</label>
            <div style="display: flex; gap: 8px;">
                <div class="input-wrapper" style="width: 180px;">
                    <input type="number" id="steelInput" value="7000" oninput="debouncedCalculate()">
                    <span id="inputSuffix1" class="input-suffix">Units</span>
                </div>
                <button class="header-btn" onclick="calculateMaxFromBank()">⚡ Max</button>
            </div>
        </div>
        
        <div class="input-group">
            <label id="displayLabel">Format:</label>
            <select id="displayMode" class="header-select" onchange="handleModeChange()" style="width:180px">
                <option value="units">Units</option>
                <option value="stacks">Stacks (10k)</option>
            </select>
        </div>

        <div class="input-group">
            <label id="crafterLabel">Crafters:</label>
            <div class="input-wrapper" style="width: 100px;">
                <input type="number" id="crafterCount" value="1" oninput="debouncedCalculate()">
            </div>
        </div>
    </div>

    <div class="bonus-toggles">
        <label><input type="checkbox" id="chkMastery" onchange="debouncedCalculate()"> Mastery (+6%)</label>
        <label><input type="checkbox" id="chkExtract" onchange="debouncedCalculate()"> Extract (+3%)</label>
        <label><input type="checkbox" id="chkRefine" onchange="debouncedCalculate()"> Refine (+3%)</label>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 id="marketTitle">Materials Bank</h2>
        <button class="header-btn" onclick="clearBank()" style="font-size: 0.8em;">🗑️ Clear Bank</button>
    </div>
    
    <div class="inventory-grid">
        <div class="inv-header">Resource</div><div class="inv-header">Price/10k</div><div class="inv-header">In Bank</div>
        <div style="text-align:right">Granum</div><div class="inv-cell"><input type="number" id="priceGranum" value="15" oninput="debouncedCalculate()">g</div><div class="inv-cell"><input type="number" id="bankGranum" oninput="debouncedCalculate()"><span class="inputSuffix2 text-dim"></span></div>
        <div style="text-align:right">Calx</div><div class="inv-cell"><input type="number" id="priceCalx" value="35" oninput="debouncedCalculate()">g</div><div class="inv-cell"><input type="number" id="bankCalx" oninput="debouncedCalculate()"><span class="inputSuffix2 text-dim"></span></div>
        <div style="text-align:right">Saburra</div><div class="inv-cell"><input type="number" id="priceSaburra" value="15" oninput="debouncedCalculate()">g</div><div class="inv-cell"><input type="number" id="bankSaburra" oninput="debouncedCalculate()"><span class="inputSuffix2 text-dim"></span></div>
        <div style="text-align:right">Water</div><div class="inv-cell"><input type="number" id="priceWater" value="1" oninput="debouncedCalculate()">g</div><div class="inv-cell"><input type="number" id="bankWater" oninput="debouncedCalculate()"><span class="inputSuffix2 text-dim"></span></div>
    </div>

    <h2 id="intBankTitle">Components Bank</h2>
    <div class="intermediate-grid">
        <div style="text-align:right">Sab. Pwdr</div><div class="inv-cell"><input type="number" id="bankSabPowder" oninput="debouncedCalculate()"></div>
        <div style="text-align:right">Calx Pwdr</div><div class="inv-cell"><input type="number" id="bankCalxPowder" oninput="debouncedCalculate()"></div>
        <div style="text-align:right">Coal</div><div class="inv-cell"><input type="number" id="bankCoal" oninput="debouncedCalculate()"></div>
        <div style="text-align:right">Coke</div><div class="inv-cell"><input type="number" id="bankCoke" oninput="debouncedCalculate()"></div>
        <div style="text-align:right">Pig Iron</div><div class="inv-cell"><input type="number" id="bankPigIron" oninput="debouncedCalculate()"></div>
        <div style="text-align:right">Grain Steel</div><div class="inv-cell"><input type="number" id="bankGrainSteel" oninput="debouncedCalculate()"></div>
    </div>

    <h2 id="rawTitle">Logistics: To Gather</h2>
    <div class="summary-box" id="rawMaterials"></div>
    <div class="cost-box" id="costSummary"></div>

    <h2 id="stepsTitle">Instructions</h2>
    <div class="steps" id="stepList"></div>

    <div class="action-buttons">
        <button class="btn-action" onclick="copyToDiscord()" id="btnDiscord">📋 Discord</button>
        <button class="btn-action" onclick="exportCSV()">📊 CSV</button>
    </div>

    <div class="footer-status" id="saveStatus">Initializing...</div>
</div>

<script>
    let currentLang = 'en';
    let previousMode = 'units';
    let calcTimeout = null;

    const text = {
        en: {
            req: "Req", bank: "Bank", gather: "Gather", total: "Total Cost", perStk: "Cost/Stack",
            noMats: "✅ Bank covers everything!", awaiting: "Set Target..."
        },
        fr: {
            req: "Req", bank: "Banque", gather: "Récolter", total: "Coût Total", perStk: "Coût/Stack",
            noMats: "✅ La banque couvre tout !", awaiting: "Définir l'objectif..."
        }
    };

    // --- DEBOUNCE LOGIC ---
    function debouncedCalculate() {
        clearTimeout(calcTimeout);
        calcTimeout = setTimeout(() => {
            calculate();
        }, 150);
    }

    // --- SAVING & THEME ---
    function toggleTheme() { 
        document.body.classList.toggle('light-theme'); 
        saveToLocalStorage();
    }

    function saveToLocalStorage() {
        const ids = [
            'steelInput', 'displayMode', 'crafterCount', 'priceGranum', 'priceCalx', 
            'priceSaburra', 'priceWater', 'bankGranum', 'bankCalx', 'bankSaburra', 
            'bankWater', 'bankSabPowder', 'bankCalxPowder', 'bankCoal', 'bankCoke', 
            'bankPigIron', 'bankGrainSteel'
        ];
        const data = {};
        ids.forEach(id => data[id] = document.getElementById(id).value);
        data.chkMastery = document.getElementById('chkMastery').checked;
        data.chkExtract = document.getElementById('chkExtract').checked;
        data.chkRefine = document.getElementById('chkRefine').checked;
        data.lang = document.getElementById('langSelect').value;
        data.theme = document.body.classList.contains('light-theme') ? 'light' : 'dark';
        
        localStorage.setItem('steelSuite_Save', JSON.stringify(data));
        
        const now = new Date();
        document.getElementById('saveStatus').innerText = `Auto-saved at ${now.toLocaleTimeString()}`;
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('steelSuite_Save');
        if (!saved) return;
        const d = JSON.parse(saved);
        Object.keys(d).forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            if (el.type === 'checkbox') el.checked = d[id];
            else el.value = d[id];
        });
        if (d.theme === 'light') document.body.classList.add('light-theme');
        if (d.lang) currentLang = d.lang;
        previousMode = d.displayMode || 'units';
    }

    // --- CALCULATOR CORE ---
    function getCalculations(desiredSteel) {
        const mode = document.getElementById('displayMode').value;
        const getBank = (id) => mode === 'stacks' ? (Number(document.getElementById(id).value)||0) * 10000 : (Number(document.getElementById(id).value)||0);
        
        const b = {
            granum: getBank('bankGranum'), calx: getBank('bankCalx'), saburra: getBank('bankSaburra'), water: getBank('bankWater'),
            sp: getBank('bankSabPowder'), cp: getBank('bankCalxPowder'), coal: getBank('bankCoal'), coke: getBank('bankCoke'),
            pi: getBank('bankPigIron'), gs: getBank('bankGrainSteel')
        };

        const mE = document.getElementById('chkExtract').checked ? 1.03 : 1;
        const mR = document.getElementById('chkRefine').checked ? 1.03 : 1;
        const mM = document.getElementById('chkMastery').checked ? 1.06 : 1;

        // Simplified Tree Logic
        const reqGS = Math.ceil(desiredSteel / (0.7 * mR));
        const diffGS = Math.max(0, reqGS - b.gs);
        
        const reqPI = Math.ceil(diffGS / (0.7 * mR));
        const diffPI = Math.max(0, reqPI - b.pi);
        
        const reqBlood = Math.ceil(diffPI / (0.4 * mR));
        const reqGranum = Math.ceil(reqBlood / (0.198 * mE * mM));
        const defGranum = Math.max(0, reqGranum - b.granum);

        // ... Add secondary materials like Calx/Saburra Powder requirements here ...
        // (Simplified for demo, but includes the Heat-Map trigger)
        
        return {
            reqGranum, defGranum, bGranum: b.granum,
            reqCalx: 0, defCalx: 0, bCalx: b.calx, // Placeholders for full logic
            reqSaburra: 0, defSaburra: 0, bSaburra: b.saburra,
            reqWater: 0, defWater: 0, bWater: b.water,
            defCost: (defGranum/10000) * Number(document.getElementById('priceGranum').value)
        };
    }

    function calculate() {
        const mode = document.getElementById('displayMode').value;
        const inputVal = Number(document.getElementById('steelInput').value) || 0;
        const target = mode === 'stacks' ? inputVal * 10000 : inputVal;
        const t = text[currentLang];
        const c = getCalculations(target);

        // --- HEAT MAP LOGIC ---
        const getHmClass = (val) => {
            if (val <= 0) return 'hm-gray';
            if (val < 10000) return 'hm-yellow';
            return 'hm-red';
        };

        let matsHTML = '';
        const makeCol = (name, req, bank, def) => `
            <div class="summary-col">
                <div class="req-val">${formatAmount(req)} ${t.req}</div>
                <div class="bank-val">${formatAmount(bank)} ${t.bank}</div>
                <div class="def-val ${getHmClass(def)}">${formatAmount(def)} ${t.gather}</div>
                <div style="font-weight:bold; font-size:0.8em">${name}</div>
            </div>`;

        matsHTML += makeCol("Granum", c.reqGranum, c.bGranum, c.defGranum);
        document.getElementById('rawMaterials').innerHTML = matsHTML;
        
        document.getElementById('costSummary').innerHTML = `
            <div>${t.total}: <strong>${c.defCost.toFixed(1)}g</strong></div>
            <div>${t.perStk}: <strong>${(c.defCost/(target/10000 || 1)).toFixed(1)}g</strong></div>
        `;

        saveToLocalStorage();
    }

    function formatAmount(num) {
        const mode = document.getElementById('displayMode').value;
        if (mode === 'stacks') return (num / 10000).toFixed(2) + " Stk";
        return num.toLocaleString();
    }

    function clearBank() {
        if (confirm("Reset bank to zero?")) {
            const ids = ['bankGranum','bankCalx','bankSaburra','bankWater','bankSabPowder','bankCalxPowder','bankCoal','bankCoke','bankPigIron','bankGrainSteel'];
            ids.forEach(id => document.getElementById(id).value = 0);
            calculate();
        }
    }

    function handleModeChange() {
        const newMode = document.getElementById('displayMode').value;
        const ids = ['steelInput','bankGranum','bankCalx','bankSaburra','bankWater','bankSabPowder','bankCalxPowder','bankCoal','bankCoke','bankPigIron','bankGrainSteel'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            let v = Number(el.value) || 0;
            if (previousMode === 'units' && newMode === 'stacks') v /= 10000;
            else if (previousMode === 'stacks' && newMode === 'units') v *= 10000;
            el.value = v === 0 ? "" : parseFloat(v.toFixed(4));
        });
        previousMode = newMode;
        calculate();
    }

    window.onload = () => {
        loadFromLocalStorage();
        calculate();
    };
</script>
</body>
</html>
