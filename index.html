<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quartermaster Steel Logistics Suite v2.1</title>
    <style>
        :root {
            --bg-main: #1e1e24; --bg-container: #2b2b36; --text-main: #f5f5f5;
            --accent: #d4af37; --accent-hover: #b5952f; --border-color: #3a3a48;
            --bg-input: #1e1e24; --bg-box: #3a3a48; --bg-step: #23232c;
            --bg-cost: #2a2a1e; --text-dim: #a9a9b3; --success: #4CAF50;
            --warning: #ff9800; --danger: #ff4d4d;
        }
        .light-theme {
            --bg-main: #f0f2f5; --bg-container: #ffffff; --text-main: #333333;
            --accent: #b5952f; --border-color: #cccccc; --bg-input: #f9f9f9;
            --bg-box: #e9ecef; --bg-step: #f8f9fa; --bg-cost: #fff8e1;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); color: var(--text-main); padding: 40px 20px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; background-color: var(--bg-container); padding: 30px; border-radius: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); position: relative; }
        h1, h2 { color: var(--accent); text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .controls { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin: 20px 0; }
        .input-group { display: flex; flex-direction: column; align-items: center; }
        .input-wrapper { display: flex; align-items: center; background: var(--bg-input); border: 2px solid var(--accent); border-radius: 5px; overflow: hidden; }
        .input-wrapper input { font-size: 1.5em; padding: 8px; width: 150px; text-align: center; background: transparent; color: var(--text-main); border: none; outline: none; }
        .header-btn, .header-select { background: var(--accent); color: #1e1e24; border: none; padding: 8px 12px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: var(--bg-step); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .intermediate-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; background: var(--bg-step); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .inv-cell input { width: 80%; padding: 5px; text-align: center; background: var(--bg-input); color: var(--text-main); border: 1px solid var(--accent); border-radius: 4px; }
        .summary-box { display: grid; gap: 10px; background: var(--bg-box); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .summary-col { text-align: center; }
        .def-val { font-size: 1.4em; font-weight: bold; }
        .status-none { color: var(--text-dim); opacity: 0.4; }
        .status-minor { color: var(--warning); }
        .status-major { color: var(--danger); }
        .step-card { background: var(--bg-step); padding: 12px; margin-bottom: 8px; border-left: 4px solid var(--accent); border-radius: 4px; }
        .bonus-toggles { display: flex; justify-content: space-around; background: var(--bg-cost); padding: 10px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>
<div class="container">
    <h1>Steel Logistics Suite v2.1</h1>
    <div class="controls">
        <div class="input-group">
            <label>Target Steel:</label>
            <div style="display: flex; gap: 5px;">
                <div class="input-wrapper"><input type="number" id="steelInput" value="7000" oninput="calculate()"></div>
                <button class="header-btn" onclick="runMax()">⚡ Max</button>
            </div>
        </div>
        <div class="input-group">
            <label>Format:</label>
            <select id="displayMode" class="header-select" onchange="handleModeChange()">
                <option value="units">Units</option>
                <option value="stacks">Stacks (10k)</option>
            </select>
        </div>
        <button class="header-btn" onclick="toggleTheme()">☀️/🌙</button>
    </div>

    <div class="bonus-toggles">
        <label><input type="checkbox" id="chkMastery" onchange="calculate()"> Mastery (+6%)</label>
        <label><input type="checkbox" id="chkExtract" onchange="calculate()"> Extract (+3%)</label>
        <label><input type="checkbox" id="chkRefine" onchange="calculate()"> Refine (+3%)</label>
    </div>

    <h2>Bank & Market</h2>
    <div class="inventory-grid" id="rawInputs"></div>
    <div class="intermediate-grid" id="intInputs"></div>

    <h2>Deficits & Steps</h2>
    <div class="summary-box" id="summaryBox"></div>
    <div id="stepList"></div>

    <div class="controls">
        <button class="header-btn" onclick="copyDiscord()">📋 Copy Discord</button>
        <button class="header-btn" style="background:#666" onclick="clearBank()">🧹 Clear Bank</button>
    </div>
</div>

<script>
    const rawIds = ['Granum', 'Calx', 'Saburra', 'Water'];
    const intIds = ['SabPowder', 'CalxPowder', 'Coal', 'Coke', 'PigIron', 'GrainSteel'];
    
    function init() {
        const rawDiv = document.getElementById('rawInputs');
        rawDiv.innerHTML = `<div>Material</div><div>Price (g/10k)</div><div>Bank</div>`;
        rawIds.forEach(id => {
            rawDiv.innerHTML += `<div>${id}</div><div class="inv-cell"><input type="number" id="p${id}" value="${id==='Water'?1:15}"></div><div class="inv-cell"><input type="number" id="b${id}" value="0" oninput="calculate()"></div>`;
        });
        const intDiv = document.getElementById('intInputs');
        intIds.forEach(id => {
            intDiv.innerHTML += `<div>${id}<br><input type="number" id="b${id}" value="0" oninput="calculate()"></div>`;
        });
        load();
        calculate();
    }

    function handleModeChange() {
        const mode = document.getElementById('displayMode').value;
        const mult = (mode === 'stacks') ? 0.0001 : 10000;
        ['steelInput', ...rawIds.map(i=>'b'+i), ...intIds.map(i=>'b'+i)].forEach(id => {
            let el = document.getElementById(id);
            el.value = parseFloat((el.value * mult).toFixed(4));
        });
        calculate();
    }

    function getVals(id) {
        const m = document.getElementById('displayMode').value === 'stacks' ? 10000 : 1;
        return (Number(document.getElementById(id).value) || 0) * m;
    }

    function calculate() {
        const target = getVals('steelInput');
        const mExt = document.getElementById('chkExtract').checked ? 1.03 : 1;
        const mRef = document.getElementById('chkRefine').checked ? 1.03 : 1;
        const mMast = document.getElementById('chkMastery').checked ? 1.06 : 1;

        // Pipeline Logic (Using Official Table)
        const reqGS = Math.ceil(target / (0.7 * mRef));
        const craftGS = Math.max(0, reqGS - getVals('bGrainSteel'));
        
        const reqPI = Math.ceil(craftGS / (0.7 * mRef));
        const craftPI = Math.max(0, reqPI - getVals('bPigIron'));

        const reqBO = Math.ceil(craftPI / (0.4 * mRef));
        const reqGra = Math.ceil(reqBO / (0.198 * mExt * mMast));

        const cokeNeed = Math.ceil(craftGS * 0.5) + Math.ceil(reqBO * 0.0385);
        const craftCoke = Math.max(0, cokeNeed - getVals('bCoke'));

        const coalNeed = Math.ceil(reqGS * 0.5) + Math.ceil(craftCoke / (0.72 * mRef));
        const craftCoal = Math.max(0, coalNeed - getVals('bCoal'));

        const cpNeed = Math.ceil(reqGra * 0.0715) + Math.ceil((craftCoke/(0.72*mRef))*0.0715) + Math.ceil(reqPI * 0.5);
        const craftCP = Math.max(0, cpNeed - getVals('bCalxPowder'));

        const spNeed = Math.ceil(reqGS * 0.5);
        const craftSP = Math.max(0, spNeed - getVals('bSabPowder'));

        const reqSab = Math.ceil(craftSP / (0.4275 * mExt));
        const calxGrind = Math.ceil(craftCP / (0.2058 * mExt));
        const coalFromGrind = Math.ceil(calxGrind * 0.1140 * mExt);
        const calxCrush = Math.ceil(Math.max(0, craftCoal - coalFromGrind) / (0.2160 * mExt));

        const defs = {
            Granum: Math.max(0, reqGra - getVals('bGranum')),
            Calx: Math.max(0, (calxGrind + calxCrush) - getVals('bCalx')),
            Saburra: Math.max(0, reqSab - getVals('bSaburra')),
            Water: Math.max(0, (Math.ceil((reqSab + calxGrind) * 0.1)) - getVals('bWater'))
        };

        // Render Summary
        let sumHtml = '';
        Object.keys(defs).forEach(k => {
            const d = defs[k];
            const style = d <= 0 ? 'status-none' : (d < 10000 ? 'status-minor' : 'status-major');
            const fmt = document.getElementById('displayMode').value === 'stacks' ? (d/10000).toFixed(2) + ' Stk' : d.toLocaleString();
            sumHtml += `<div class="summary-col"><div class="def-val ${style}">${fmt}</div><div style="font-size:0.8em">${k}</div></div>`;
        });
        document.getElementById('summaryBox').innerHTML = sumHtml;
        document.getElementById('summaryBox').style.gridTemplateColumns = `repeat(4, 1fr)`;

        // Render Steps
        let steps = [];
        if (craftSP > 0) steps.push(`Grind Saburra &#8594; ${craftSP.toLocaleString()} Saburra Powder`);
        if (calxGrind > 0) steps.push(`Grind Calx &#8594; ${craftCP.toLocaleString()} Calx Powder`);
        if (calxCrush > 0) steps.push(`Crush Calx &#8594; Coal`);
        if (reqBO > 0) steps.push(`Attractor Granum &#8594; ${reqBO.toLocaleString()} Blood Ore`);
        if (craftCoke > 0) steps.push(`Furnace Coal &#8594; ${craftCoke.toLocaleString()} Coke`);
        if (craftPI > 0) steps.push(`Furnace Blood Ore &#8594; ${craftPI.toLocaleString()} Pig Iron`);
        if (craftGS > 0) steps.push(`Oven Pig Iron &#8594; ${craftGS.toLocaleString()} Grain Steel`);
        if (target > 0) steps.push(`Final Oven: Grain Steel &#8594; ${target.toLocaleString()} Steel`);
        
        document.getElementById('stepList').innerHTML = steps.map((s, i) => `<div class="step-card"><strong>Step ${i+1}:</strong> ${s}</div>`).join('');
        save();
    }

    function runMax() {
        let low = 0, high = 10000000, best = 0;
        while(low <= high) {
            let mid = Math.floor((low + high) / 2);
            // Check Granum deficit only (The metal bottleneck)
            const check = getCalculations(mid);
            if (check.defGranum <= 0) { best = mid; low = mid + 1; }
            else high = mid - 1;
        }
        document.getElementById('steelInput').value = document.getElementById('displayMode').value === 'stacks' ? (best/10000) : best;
        calculate();
    }

    function save() {
        const d = {}; document.querySelectorAll('input, select').forEach(i => d[i.id] = i.value);
        localStorage.setItem('mo2_v2.1', JSON.stringify(d));
    }
    function load() {
        const s = localStorage.getItem('mo2_v2.1');
        if(s) { const d = JSON.parse(s); Object.keys(d).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = d[id]; }); }
    }
    function clearBank() { document.querySelectorAll('[id^="b"]').forEach(i => i.value = 0); calculate(); }
    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function copyDiscord() {
        const msg = `**⚔️ Steel Logistics Order ⚔️**\nTarget: ${document.getElementById('steelInput').value} Stacks\n\n` + document.getElementById('stepList').innerText;
        navigator.clipboard.writeText(msg);
        alert("Copied to Discord!");
    }

    init();
</script>
</body>
</html>
